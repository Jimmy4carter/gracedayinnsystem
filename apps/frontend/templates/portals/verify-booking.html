{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="apple-touch-icon" sizes="76x76" href="{% static 'admin/assets/img/apple-icon.png' %}">
    <link rel="icon" type="image/png" href="{% static 'admin/assets/img/favicon.png' %}">
    <title>GRACEDAY INN | Booking Verification</title>
    <link id="pagestyle" href="{% static 'admin/assets/css/soft-ui-dashboard.css' %}" rel="stylesheet" />
    <style>
        body {
            background: linear-gradient(135deg, #fdf8f2, #f6eee3);
        }
        .main-content {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        .card.card-plain {
            background: #ffffff;
            border-radius: 22px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
            padding: 30px;
        }
        .card-body {
            padding: 0;
        }
        .card-header h3 {
            color: #222222;
        }
        .text-info.text-gradient {
            color: #c89b3c !important;
            background: none !important;
        }
        .btn.bg-gradient-info {
            background: linear-gradient(135deg, #c89b3c, #e7be67) !important;
            border: none !important;
        }
        .page-header {
            background: transparent !important;
            min-height: auto !important;
        }
        label {
            font-weight: 700;
            color: #333;
        }
    </style>
</head>
<body>
    <main class="main-content mt-0">
        <section>
            <div class="page-header min-vh-75">
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-xl-7 col-lg-8 col-md-10">
                            <div class="card card-plain mt-8">
                                <div class="card-header pb-3 text-left bg-transparent">
                                    <h3 class="font-weight-bolder text-info text-gradient mb-1">Verify Email</h3>
                                    <p class="mb-0 text-muted">A 6-digit verification code was sent to <strong>{{ email }}</strong>. Enter the code below to complete your booking.</p>
                                </div>
                                <div class="card-body">
                                    {% if messages %}
                                        {% for message in messages %}
                                            <div class="alert alert-{{ message.tags|default:'info' }} text-white bg-gradient-danger p-2 mb-3 text-sm rounded">{{ message }}</div>
                                        {% endfor %}
                                    {% endif %}
                                    <form method="post">
                                        {% csrf_token %}
                                        <label for="verification_code">Verification Code</label>
                                        <div class="mb-3">
                                            <input type="text" name="verification_code" id="verification_code" class="form-control" placeholder="123456" required autocomplete="off" max_length="6" style="letter-spacing: 0.5em; text-align: center; font-size: 1.5rem;">
                                        </div>
                                        <div class="text-center"><button type="submit" class="btn bg-gradient-info w-100 mt-4 mb-0">Verify & Complete Booking</button></div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="{% static 'admin/assets/js/core/popper.min.js' %}"></script>
    <script src="{% static 'admin/assets/js/core/bootstrap.min.js' %}"></script>
</body>
</html>
