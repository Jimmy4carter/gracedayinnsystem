{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Graceday Inn</title>
<link rel="stylesheet" href="{% static 'css/glassmorphism.css' %}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 16px; }
  .register-card { width:100%; max-width:500px; }
  .brand { text-align:center; margin-bottom:28px; }
  .brand h1 { font-size:26px; font-weight:700; background:linear-gradient(135deg,#6366f1,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .brand p { color:var(--text-secondary); margin-top:4px; font-size:0.9rem; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
</style>
</head>
<body>
<div class="register-card glass-card">
  <div class="brand">
    <h1>🏨 Graceday Inn</h1>
    <p>Create your account to start booking</p>
  </div>

  <form id="register-form">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">First Name</label>
        <input type="text" id="first_name" class="form-control" placeholder="John" required>
      </div>
      <div class="form-group">
        <label class="form-label">Last Name</label>
        <input type="text" id="last_name" class="form-control" placeholder="Doe" required>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-control" placeholder="johndoe" required>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
    </div>
    <div class="form-group">
      <label class="form-label">Phone</label>
      <input type="tel" id="phone" class="form-control" placeholder="+1 555 000 0000">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="password_confirm" class="form-control" placeholder="Repeat password" required>
      </div>
    </div>

    <div id="error-msg" style="display:none;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;font-size:0.85rem;color:#fca5a5;margin-bottom:16px;"></div>

    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" id="register-btn">
      Create Account
    </button>
  </form>

  <div style="text-align:center;margin-top:20px;font-size:0.9rem;color:rgba(255,255,255,0.5);">
    Already have an account? <a href="/login/" style="color:#a78bfa;text-decoration:none;">Sign in</a>
  </div>
</div>
<div id="toast-container" class="toast-container"></div>
<script src="{% static 'js/main.js' %}"></script>
<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('register-btn');
  const errDiv = document.getElementById('error-msg');
  errDiv.style.display = 'none';

  const pass = document.getElementById('password').value;
  const pass2 = document.getElementById('password_confirm').value;
  if (pass !== pass2) {
    errDiv.textContent = 'Passwords do not match.';
    errDiv.style.display = 'block';
    return;
  }

  btn.textContent = 'Creating account...';
  btn.disabled = true;

  try {
    const data = await api.post('/auth/register/', {
      username: document.getElementById('username').value,
      email: document.getElementById('email').value,
      first_name: document.getElementById('first_name').value,
      last_name: document.getElementById('last_name').value,
      phone: document.getElementById('phone').value,
      password: pass,
      password_confirm: pass2,
    });
    localStorage.setItem('access_token', data.access);
    localStorage.setItem('refresh_token', data.refresh);
    if (data.user) localStorage.setItem('user', JSON.stringify(data.user));
    authToken = data.access;
    toast.success('Account created! Redirecting...');
    setTimeout(() => window.location.href = '/dashboard/', 800);
  } catch (err) {
    btn.textContent = 'Create Account';
    btn.disabled = false;
    let msg = 'Registration failed. Please try again.';
    try {
      const errData = JSON.parse(err.message);
      const msgs = Object.values(errData).flat();
      if (msgs.length) msg = msgs.join(' ');
    } catch (_) {}
    errDiv.textContent = msg;
    errDiv.style.display = 'block';
  }
});
</script>
</body>
</html>
