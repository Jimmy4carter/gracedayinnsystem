{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Graceday Inn</title>
<link rel="stylesheet" href="{% static 'css/glassmorphism.css' %}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { width: 100%; max-width: 420px; }
  .brand { text-align: center; margin-bottom: 32px; }
  .brand h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .brand p { color: var(--text-secondary); margin-top: 4px; }
</style>
</head>
<body>
<div class="login-card glass-card">
  <div class="brand">
    <h1>🏨 Graceday Inn</h1>
    <p>Hotel Management System</p>
  </div>
  <h2 style="font-size:20px; margin-bottom:24px;">Sign In</h2>
  <form id="login-form">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-control" placeholder="Enter username" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter password" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;" id="login-btn">
      Sign In
    </button>
  </form>
</div>
<div id="toast-container" class="toast-container"></div>
<script src="{% static 'js/main.js' %}"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  btn.textContent = 'Signing in...';
  btn.disabled = true;
  try {
    const data = await api.post('/accounts/users/login/', {
      username: document.getElementById('username').value,
      password: document.getElementById('password').value,
    });
    localStorage.setItem('access_token', data.access);
    localStorage.setItem('refresh_token', data.refresh);
    authToken = data.access;
    toast.success('Welcome back!');
    setTimeout(() => window.location.href = '/', 800);
  } catch (err) {
    toast.error('Invalid credentials. Please try again.');
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
